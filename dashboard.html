<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A3D5C" />
    <title>GEMAR-KKP · Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/gemar-style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
</head>

<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header__brand">
                <img src="assets/img/logo.svg" class="header__logo" alt="GEMAR-KKP">
                <span class="header__title">GEMAR-KKP</span>
            </div>
            <nav class="header__nav">
                <a href="#" class="header__link header__link--active">Dashboard</a>
                <a href="laporan-bulanan.html" class="header__link">Laporan Bulanan</a>
                <button class="header__btn header__btn--logout" onclick="handleLogout()">Logout</button>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Welcome Section -->
            <section class="welcome">
                <h1 class="welcome__title">Selamat datang, <span id="userName">-</span></h1>
                <p class="welcome__subtitle" id="userRole">-</p>
            </section>

            <!-- Stats Grid -->
            <section class="stats">
                <div class="stat-card">
                    <div class="stat-card__icon stat-card__icon--listrik">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </div>
                    <div class="stat-card__content">
                        <div class="stat-card__label">Pemakaian Listrik</div>
                        <div class="stat-card__value" id="statListrik">-</div>
                        <div class="stat-card__change stat-card__change--down">↓ 12% dari bulan lalu</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-card__icon stat-card__icon--air">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>
                        </svg>
                    </div>
                    <div class="stat-card__content">
                        <div class="stat-card__label">Pemakaian Air</div>
                        <div class="stat-card__value" id="statAir">-</div>
                        <div class="stat-card__change stat-card__change--down">↓ 8% dari bulan lalu</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-card__icon stat-card__icon--bbm">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 22h20M12 2v20M6 12h4"/>
                        </svg>
                    </div>
                    <div class="stat-card__content">
                        <div class="stat-card__label">Pemakaian BBM</div>
                        <div class="stat-card__value" id="statBbm">-</div>
                        <div class="stat-card__change stat-card__change--up">↑ 3% dari bulan lalu</div>
                    </div>
                </div>

                <div class="stat-card stat-card--highlight">
                    <div class="stat-card__icon stat-card__icon--hemat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            <path d="M9 12l2 2 4-4"/>
                        </svg>
                    </div>
                    <div class="stat-card__content">
                        <div class="stat-card__label">Total Penghematan</div>
                        <div class="stat-card__value stat-card__value--gold" id="statHemat">Rp 2.5JT</div>
                        <div class="stat-card__change stat-card__change--down">Target tercapai!</div>
                    </div>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="actions">
                <h2 class="section-title">Aksi Cepat</h2>
                <div class="actions__grid">
                    <a href="laporan-bulanan.html" class="action-card">
                        <div class="action-card__icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                        </div>
                        <span>Buat Laporan Bulanan</span>
                    </a>
                    <a href="laporan-bulanan.html" class="action-card">
                        <div class="action-card__icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                            </svg>
                        </div>
                        <span>Laporan Bulanan</span>
                    </a>
                    <a href="approval.html" class="action-card" id="approvalBtn" style="display:none">
                        <div class="action-card__icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 11l3 3L22 4"/>
                                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                            </svg>
                        </div>
                        <span>Approval</span>
                    </a>
                    <a href="admin.html" class="action-card" id="adminBtn" style="display:none">
                        <div class="action-card__icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                            </svg>
                        </div>
                        <span>Admin</span>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        // requireAuth() cek token di localStorage/sessionStorage dan validasi expiry
        const user = requireAuth();
        if (!user) throw new Error('redirect to login');

        const roleLabels = {
            'upt_admin':  'Admin UPT',
            'eselon1':    'Sekretaris Ditjen / Badan',
            'superadmin': 'Sekretaris Jenderal'
        };
        document.getElementById('userName').textContent = user.name || 'User';
        document.getElementById('userRole').textContent = roleLabels[user.role] || user.role;

        if (user.role === 'eselon1' || user.role === 'superadmin') {
            document.getElementById('approvalBtn').style.display = 'flex';
        }
        if (user.role === 'superadmin') {
            document.getElementById('adminBtn').style.display = 'flex';
        }
    </script>
</body>

</html>
