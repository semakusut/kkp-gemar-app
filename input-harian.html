<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A3D5C" />
    <title>GEMAR-KKP · Input Harian</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/gemar-style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/input-harian.css">
    <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
</head>

<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header__brand">
                <img src="assets/img/logo.svg" class="header__logo" alt="GEMAR-KKP">
                <span class="header__title">GEMAR-KKP</span>
            </div>
            <nav class="header__nav">
                <a href="dashboard.html" class="header__link">Dashboard</a>
                <a href="input-harian.html" class="header__link header__link--active"> Input Harian</a>
                <a href="laporan-bulanan.html" class="header__link"> Laporan</a>
                <button class="header__btn header__btn--logout" onclick="handleLogout()">Logout</button>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main">
            <section class="welcome">
                <h1 class="welcome__title">Input Laporan Harian</h1>
                <p class="welcome__subtitle">Catat pemakaian energi hari ini untuk UPT Anda.</p>
            </section>

            <section class="form-container">
                <form id="dailyForm" class="form-card" onsubmit="event.preventDefault(); submitDailyReport();">
                    
                    <div class="form-section">
                        <h2 class="form-section__title">Informasi Umum</h2>
                        <div class="field">
                            <label class="field__label" for="tanggal">Tanggal Pelaporan</label>
                            <input type="date" id="tanggal" class="field__input" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">Listrik (kWh)</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="listrik_awal">Meter Awal</label>
                                <input type="number" step="0.01" id="listrik_awal" class="field__input" required placeholder="0.00">
                            </div>
                            <div class="field">
                                <label class="field__label" for="listrik_akhir">Meter Akhir</label>
                                <input type="number" step="0.01" id="listrik_akhir" class="field__input" required placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">Air (m³)</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="air_awal">Meter Awal</label>
                                <input type="number" step="0.01" id="air_awal" class="field__input" required placeholder="0.00">
                            </div>
                            <div class="field">
                                <label class="field__label" for="air_akhir">Meter Akhir</label>
                                <input type="number" step="0.01" id="air_akhir" class="field__input" required placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">BBM (Liter)</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="bbm_awal">Stok Awal</label>
                                <input type="number" step="0.01" id="bbm_awal" class="field__input" required placeholder="0.00">
                            </div>
                            <div class="field">
                                <label class="field__label" for="bbm_akhir">Stok Akhir</label>
                                <input type="number" step="0.01" id="bbm_akhir" class="field__input" required placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <div id="form-error" class="form__error" style="display:none;"></div>
                    <div id="form-success" class="form__success" style="display:none;"></div>

                    <div class="form-actions">
                        <button type="submit" id="btn-submit" class="btn">
                            Simpan Laporan
                            <svg class="btn__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <path d="M5 12h14M13 6l6 6-6 6" />
                            </svg>
                        </button>
                    </div>

                </form>
            </section>
        </main>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        const user = requireAuth();
        if (!user) throw new Error('redirect to login');

        // Set default date to today
        document.getElementById('tanggal').valueAsDate = new Date();

        function showError(msg) {
            const err = document.getElementById('form-error');
            const succ = document.getElementById('form-success');
            err.textContent = msg;
            err.style.display = 'block';
            succ.style.display = 'none';
        }

        function showSuccess(msg) {
            const err = document.getElementById('form-error');
            const succ = document.getElementById('form-success');
            succ.textContent = msg;
            succ.style.display = 'block';
            err.style.display = 'none';
        }

        async function submitDailyReport() {
            const btn = document.getElementById('btn-submit');
            
            const p = {
                action: 'report.daily.create',
                token: getToken(),
                tanggal: document.getElementById('tanggal').value,
                listrik_awal: document.getElementById('listrik_awal').value,
                listrik_akhir: document.getElementById('listrik_akhir').value,
                air_awal: document.getElementById('air_awal').value,
                air_akhir: document.getElementById('air_akhir').value,
                bbm_awal: document.getElementById('bbm_awal').value,
                bbm_akhir: document.getElementById('bbm_akhir').value
            };

            // Validation
            if (parseFloat(p.listrik_akhir) < parseFloat(p.listrik_awal)) {
                return showError("Meteran akhir listrik tidak boleh lebih kecil dari meter awal.");
            }
            if (parseFloat(p.air_akhir) < parseFloat(p.air_awal)) {
                return showError("Meteran akhir air tidak boleh lebih kecil dari meter awal.");
            }
            if (parseFloat(p.bbm_akhir) > parseFloat(p.bbm_awal)) {
                return showError("Stok akhir BBM tidak boleh lebih besar dari stok awal.");
            }

            try {
                setLoading_(btn, true);
                
                // Optimistic UI + Background Sync
                await enqueueRequest(p);
                
                showSuccess("Laporan berhasil disimpan (sinkronisasi background)!");
                // Reset form fields
                ['listrik_awal', 'listrik_akhir', 'air_awal', 'air_akhir', 'bbm_awal', 'bbm_akhir'].forEach(id => {
                    document.getElementById(id).value = '';
                });
            } catch (err) {
                console.error(err);
                showError("Terjadi kesalahan sistem saat memproses form.");
            } finally {
                setLoading_(btn, false);
            }
        }
    </script>
</body>

</html>
