<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2068" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GEMAR-KKP" />
    <link rel="apple-touch-icon" href="../assets/img/logo.svg" />
    <title>GEMAR-KKP · Laporan Bulanan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/gemar-style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo.svg" />
    <script src="../assets/js/loader.js"></script>
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .form-card {
            background: #ffffff;
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }
        .form-section {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 1rem;
        }
        .form-section__title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .field__label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .field__input, .field__select, .field__textarea {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9375rem;
            transition: all 0.2s;
            background: var(--surface-main);
        }
        .field__textarea {
            resize: vertical;
            min-height: 80px;
        }
        .field__input:focus, .field__select:focus, .field__textarea:focus {
            outline: none;
            border-color: var(--primary-main);
            box-shadow: 0 0 0 3px rgba(10, 61, 92, 0.1);
        }
        .field__file {
            padding: 0.5rem;
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: var(--surface-main);
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        .form__error {
            background: #FEE2E2;
            color: #991B1B;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }
        .form__success {
            background: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }
        .progress-container {
            display: none;
            margin-bottom: 1.5rem;
        }
        .progress-text {
            font-size: 0.875rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-main);
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .progress-fill.error {
            background: #DC2626;
        }
        @media (max-width: 640px) {
            .field-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header__brand">
                <img src="../assets/img/logo.svg" class="header__logo" alt="GEMAR-KKP">
                <span class="header__title">GEMAR-KKP</span>
            </div>
            <nav class="header__nav">
                <a href="dashboard.html" class="header__link">Dashboard</a>
                <a href="laporan-bulanan.html" class="header__link header__link--active">Laporan Bulanan</a>
                <button class="header__btn header__btn--logout" onclick="handleLogout()">Logout</button>
            </nav>
        </header>

        <main class="main">
            <section class="welcome">
                <h1 class="welcome__title">Input Laporan Bulanan</h1>
                <p class="welcome__subtitle">Catat pemakaian energi dan lampirkan bukti nota bulan ini.</p>
            </section>

            <section class="form-container">
                <form id="monthlyForm" class="form-card" onsubmit="event.preventDefault(); submitMonthlyReport();">
                    
                    <div class="form-section">
                        <h2 class="form-section__title">Periode Pelaporan</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="bulan">Bulan</label>
                                <select id="bulan" class="field__select" required>
                                    <option value="0">Januari</option>
                                    <option value="1">Februari</option>
                                    <option value="2">Maret</option>
                                    <option value="3">April</option>
                                    <option value="4">Mei</option>
                                    <option value="5">Juni</option>
                                    <option value="6">Juli</option>
                                    <option value="7">Agustus</option>
                                    <option value="8">September</option>
                                    <option value="9">Oktober</option>
                                    <option value="10">November</option>
                                    <option value="11">Desember</option>
                                </select>
                            </div>
                            <div class="field">
                                <label class="field__label" for="tahun">Tahun</label>
                                <input type="number" id="tahun" class="field__input" required min="2020" max="2100">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">⚡ Listrik</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="listrik_kwh">Pemakaian (kWh)</label>
                                <input type="number" step="0.01" id="listrik_kwh" class="field__input" required placeholder="0">
                            </div>
                            <div class="field">
                                <label class="field__label" for="listrik_harga">Tagihan / Harga (Rp)</label>
                                <input type="number" step="0.01" id="listrik_harga" class="field__input" required placeholder="0">
                            </div>
                        </div>
                        <div class="field">
                            <label class="field__label" for="listrik_file">Upload Bukti Listrik (JPG/PDF, Max 2MB)</label>
                            <input type="file" id="listrik_file" class="field__file" accept=".jpg,.jpeg,.png,.pdf" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">💧 Air</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="air_kubik">Pemakaian (m³)</label>
                                <input type="number" step="0.01" id="air_kubik" class="field__input" required placeholder="0">
                            </div>
                            <div class="field">
                                <label class="field__label" for="air_harga">Tagihan / Harga (Rp)</label>
                                <input type="number" step="0.01" id="air_harga" class="field__input" required placeholder="0">
                            </div>
                        </div>
                        <div class="field">
                            <label class="field__label" for="air_file">Upload Bukti Air (JPG/PDF, Max 2MB)</label>
                            <input type="file" id="air_file" class="field__file" accept=".jpg,.jpeg,.png,.pdf" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">📞 Telepon</h2>
                        <div class="field-row">
                            <div class="field">
                                <label class="field__label" for="telepon_jam">Pemakaian (Jam)</label>
                                <input type="number" step="0.01" id="telepon_jam" class="field__input" required placeholder="0">
                            </div>
                            <div class="field">
                                <label class="field__label" for="telepon_harga">Tagihan / Harga (Rp)</label>
                                <input type="number" step="0.01" id="telepon_harga" class="field__input" required placeholder="0">
                            </div>
                        </div>
                        <div class="field">
                            <label class="field__label" for="telepon_file">Upload Bukti Telepon (JPG/PDF, Max 2MB)</label>
                            <input type="file" id="telepon_file" class="field__file" accept=".jpg,.jpeg,.png,.pdf" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section__title">📋 Upaya Penghematan & Kendala</h2>
                        <div class="field">
                            <label class="field__label" for="upaya_penghematan">Upaya Penghematan yang Dilakukan</label>
                            <textarea id="upaya_penghematan" class="field__input" rows="3" placeholder="cth: Mematikan AC & lampu saat tidak digunakan, menggunakan lampu LED"></textarea>
                        </div>
                        <div class="field">
                            <label class="field__label" for="kendala">Kendala yang Dihadapi</label>
                            <textarea id="kendala" class="field__input" rows="3" placeholder="cth: Gedung tua dengan sistem kelistrikan yang tidak efisien"></textarea>
                        </div>
                    </div>

                    <div id="form-error" class="form__error"></div>
                    <div id="form-success" class="form__success"></div>

                    <div id="progress-container" class="progress-container">
                        <div id="progress-text" class="progress-text">Memproses data...</div>
                        <div class="progress-bar">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-submit" class="btn">
                            Kirim Laporan & Upload
                            <svg class="btn__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <path d="M5 12h14M13 6l6 6-6 6" />
                            </svg>
                        </button>
                    </div>

                </form>
            </section>
        </main>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        const user = requireAuth();
        if (!user) throw new Error('redirect to login');

        const params = new URLSearchParams(window.location.search);
        const editId = params.get('edit');
        const isEditMode = !!editId;

        if (isEditMode) {
            document.querySelector('.welcome__title').textContent = 'Edit Laporan Bulanan';
            document.querySelector('.welcome__subtitle').textContent = 'Perbarui data laporan';
            document.getElementById('btn-submit').innerHTML = 'Simpan Perubahan';
            loadLaporanForEdit(editId);
        }

        const now = new Date();
        if (!isEditMode) {
            document.getElementById('bulan').value = now.getMonth();
            document.getElementById('tahun').value = now.getFullYear();
        }

        function loadLaporanForEdit(reportId) {
            PageLoader.start('Memuat data laporan untuk diedit...');
            fetch(AUTH_CONFIG.apiUrl, {
                method: 'POST',
                body: new URLSearchParams({
                    action: 'report.monthly.get',
                    token: getToken(),
                    report_id: reportId
                })
            })
            .then(res => res.json())
            .then(result => {
                if (!result.success) {
                    PageLoader.error(
                        'Gagal memuat laporan: ' + result.error,
                        () => loadLaporanForEdit(reportId)
                    );
                    return;
                }
                const r = result.data.report;
                document.getElementById('bulan').value = parseInt(r.bulan) - 1;
                document.getElementById('tahun').value = r.tahun;
                document.getElementById('listrik_kwh').value = r.listrik_kwh || '';
                document.getElementById('listrik_harga').value = r.listrik_harga || '';
                document.getElementById('air_kubik').value = r.air_kubik || '';
                document.getElementById('air_harga').value = r.air_harga || '';
                document.getElementById('telepon_jam').value = r.telepon_jam || '';
                document.getElementById('telepon_harga').value = r.telepon_harga || '';
                document.getElementById('upaya_penghematan').value = r.upaya_penghematan || '';
                document.getElementById('kendala').value = r.kendala || '';
                PageLoader.finish();
            })
            .catch(err => {
                PageLoader.error(
                    'Koneksi gagal saat memuat data laporan. (' + err.message + ')',
                    () => loadLaporanForEdit(reportId)
                );
            });
        }

        function showError(msg) {
            const err = document.getElementById('form-error');
            const succ = document.getElementById('form-success');
            err.textContent = msg;
            err.style.display = 'block';
            succ.style.display = 'none';
        }

        function showSuccess(msg) {
            const err = document.getElementById('form-error');
            const succ = document.getElementById('form-success');
            succ.textContent = msg;
            succ.style.display = 'block';
            err.style.display = 'none';
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({
                    name: file.name,
                    type: file.type,
                    data: reader.result
                });
                reader.onerror = error => reject(error);
            });
        }

        async function uploadFileAPI(fileB64, bulan, tahun) {
            if (!fileB64) return '';
            const body = new URLSearchParams({
                action: 'file.upload',
                token: getToken(),
                bulan: bulan,
                tahun: tahun,
                file_name: fileB64.name,
                file_type: fileB64.type,
                file_data: fileB64.data
            });
            const res = await fetch(AUTH_CONFIG.apiUrl, { method: 'POST', body: body });
            if (!res.ok) throw new Error('HTTP Error ' + res.status);
            const result = await res.json();
            if (!result.success) throw new Error(result.error || 'Upload gagal');
            return result.data.url;
        }

        async function submitMonthlyReport() {
            const btn = document.getElementById('btn-submit');
            const progContainer = document.getElementById('progress-container');
            const progText = document.getElementById('progress-text');
            const progFill = document.getElementById('progress-fill');
            
            document.getElementById('form-error').style.display = 'none';
            document.getElementById('form-success').style.display = 'none';
            
            const fileListrik = document.getElementById('listrik_file').files[0];
            const fileAir = document.getElementById('air_file').files[0];
            const fileTelepon = document.getElementById('telepon_file').files[0];

            // Validate file size (Max 6MB)
            const MAX_SIZE = 6 * 1024 * 1024;
            if ((fileListrik && fileListrik.size > MAX_SIZE) ||
                (fileAir && fileAir.size > MAX_SIZE) ||
                (fileTelepon && fileTelepon.size > MAX_SIZE)) {
                return showError("Ukuran file maksimal adalah 6MB per nota.");
            }

            setLoading_(btn, true);
            progContainer.style.display = 'block';
            progFill.className = 'progress-fill';
            progFill.style.width = '0%';

            try {
                const bulan = document.getElementById('bulan').value;
                const tahun = document.getElementById('tahun').value;

                // Step 1: Compress & Encode
                progText.textContent = "Mengompresi dokumen (0/3)...";
                progFill.style.width = '10%';
                const b64Listrik = await getBase64(fileListrik);
                const b64Air = await getBase64(fileAir);
                const b64Telepon = await getBase64(fileTelepon);

                // Step 2: Upload Listrik
                progText.textContent = "Mengunggah bukti listrik (1/3)...";
                progFill.style.width = '30%';
                const urlListrik = await uploadFileAPI(b64Listrik, bulan, tahun);

                // Step 3: Upload Air
                progText.textContent = "Mengunggah bukti air (2/3)...";
                progFill.style.width = '60%';
                const urlAir = await uploadFileAPI(b64Air, bulan, tahun);

                // Step 4: Upload Telepon
                progText.textContent = "Mengunggah bukti telepon (3/3)...";
                progFill.style.width = '80%';
                const urlTelepon = await uploadFileAPI(b64Telepon, bulan, tahun);

                // Step 5: Submit Report
                progText.textContent = "Menyimpan data laporan...";
                progFill.style.width = '90%';

                const p = {
                    action: isEditMode ? 'report.monthly.update' : 'report.monthly.create',
                    token: getToken(),
                    report_id: editId || undefined,
                    bulan: bulan,
                    tahun: tahun,
                    listrik_kwh: document.getElementById('listrik_kwh').value,
                    listrik_harga: document.getElementById('listrik_harga').value,
                    listrik_bukti_url: urlListrik,
                    air_kubik: document.getElementById('air_kubik').value,
                    air_harga: document.getElementById('air_harga').value,
                    air_bukti_url: urlAir,
                    telepon_jam: document.getElementById('telepon_jam').value,
                    telepon_harga: document.getElementById('telepon_harga').value,
                    telepon_bukti_url: urlTelepon,
                    upaya_penghematan: document.getElementById('upaya_penghematan').value,
                    kendala: document.getElementById('kendala').value
                };

                const body = new URLSearchParams();
                for (const key in p) {
                    if (p[key] !== undefined) body.append(key, p[key]);
                }

                const res = await fetch(AUTH_CONFIG.apiUrl, { method: 'POST', body: body });
                if (!res.ok) throw new Error('Koneksi terputus (HTTP ' + res.status + ')');
                const result = await res.json();

                if (result.success) {
                    progFill.style.width = '100%';
                    progText.textContent = "Berhasil disimpan!";
                    showSuccess(result.message || "Laporan berhasil disimpan!");
                    if (!isEditMode) {
                        document.getElementById('monthlyForm').reset();
                        document.getElementById('bulan').value = now.getMonth();
                        document.getElementById('tahun').value = now.getFullYear();
                    }
                    setTimeout(() => {
                        progContainer.style.display = 'none';
                        if (isEditMode) window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    throw new Error(result.error || "Gagal menyimpan laporan.");
                }
            } catch (err) {
                console.error(err);
                progFill.classList.add('error');
                progText.textContent = "Upload dibatalkan karena Error.";
                showError("Gagal: " + err.message);
            } finally {
                setLoading_(btn, false);
            }
        }
    </script>
</body>
</html>
