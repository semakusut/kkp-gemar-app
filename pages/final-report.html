<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2068" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GEMAR-KKP" />
    <link rel="apple-touch-icon" href="../assets/img/logo.svg" />
    <title>GEMAR-KKP · Final Report</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/gemar-style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo.svg" />
    <script src="../assets/js/loader.js"></script>
    <script src="../assets/js/utils.js"></script>
    <style>
        /* ── Generate Card ──────────────────────────────────────── */
        .generate-card { background:#fff; border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:1.75rem 2rem; margin-bottom:1.5rem; }
        .card-title { font-size:1rem; font-weight:700; color:var(--text-main); margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; }
        .card-title svg { width:20px; height:20px; }
        .form-row { display:flex; flex-wrap:wrap; gap:.75rem; align-items:flex-end; }
        .f-field { display:flex; flex-direction:column; gap:.35rem; }
        .f-field label { font-size:.75rem; font-weight:600; color:var(--text-main); opacity:.7; text-transform:uppercase; letter-spacing:.04em; }
        .f-field select, .f-field input, .f-field textarea {
            padding:.5rem .75rem; border:1px solid var(--border-color); border-radius:var(--radius-sm);
            font-size:.875rem; color:var(--text-main); background:var(--surface-main); font-family:inherit;
        }
        .f-field textarea { resize:vertical; min-height:72px; }
        .f-field input:focus, .f-field select:focus, .f-field textarea:focus {
            outline:none; border-color:var(--primary-main); box-shadow:0 0 0 3px rgba(10,61,92,.08);
        }
        .btn-preview { padding:.55rem 1.25rem; background:var(--primary-main); color:#fff; border:none; border-radius:var(--radius-sm); font-weight:700; cursor:pointer; font-size:.875rem; }
        .btn-preview:hover { background:#2929CC; }
        .btn-preview:disabled { opacity:.5; cursor:not-allowed; }
        .btn-annual-preview { padding:.55rem 1.25rem; background:#059669; color:#fff; border:none; border-radius:var(--radius-sm); font-weight:700; cursor:pointer; font-size:.875rem; display:inline-flex; align-items:center; gap:.4rem; }
        .btn-annual-preview:hover { background:#047857; }

        /* ── Preview & Form ─────────────────────────────────────── */
        .preview-section { margin-top:1.5rem; display:none; }
        .preview-section.show { display:block; }
        .divider { border:none; border-top:1px solid var(--border-color); margin:1.5rem 0; }

        .preview-grid { display:flex; flex-wrap:wrap; gap:.75rem; margin-bottom:1.25rem; }
        .pv-item { background:var(--surface-main); border:1px solid var(--border-color); border-radius:var(--radius-sm); padding:.85rem 1rem; flex:none; width:max-content; min-width:140px; }
        .pv-item__label { font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:#6B7280; font-weight:600; }
        .pv-item__val   { font-size:1.1rem; font-weight:700; color:var(--text-main); margin-top:.2rem; }
        .pv-item__sub   { font-size:.72rem; color:#6B7280; }
        .pv-item--hemat .pv-item__val { color:#2D9E3C; }

        .upt-chips { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1.25rem; }
        .upt-chip  { background:#EFF6FF; color:#1D4ED8; padding:.2rem .6rem; border-radius:999px; font-size:.72rem; font-weight:600; }

        .section-sub { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-main); opacity:.6; margin-bottom:.75rem; margin-top:1.25rem; }
        .prev-year-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.75rem; margin-bottom:1rem; }
        .prev-year-grid .f-field input { width:100%; box-sizing:border-box; }

        .full-width { grid-column:1/-1; }
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }

        .btn-submit-final { padding:.65rem 1.75rem; background:var(--primary-main); color:#fff; border:none; border-radius:var(--radius-sm); font-weight:700; cursor:pointer; font-size:.9rem; }
        .btn-submit-final:hover { background:#2929CC; }
        .btn-submit-final:disabled { opacity:.5; cursor:not-allowed; }

        /* ── Table ──────────────────────────────────────────────── */
        .section-title-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
        .section-title-bar h2 { font-size:1.05rem; font-weight:700; color:var(--text-main); }
        .table-card { background:#fff; border:1px solid var(--border-color); border-radius:var(--radius-lg); overflow:hidden; }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:.875rem; }
        thead { background:var(--surface-main); }
        thead th { padding:.85rem 1rem; text-align:left; font-weight:600; color:var(--text-main); opacity:.75; font-size:.75rem; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
        tbody tr { border-top:1px solid var(--border-color); transition:background .15s; }
        tbody tr:hover { background:#F8FBFF; }
        tbody td { padding:.85rem 1rem; color:var(--text-main); vertical-align:middle; }
        .badge { display:inline-flex; padding:.25rem .7rem; border-radius:999px; font-size:.75rem; font-weight:600; white-space:nowrap; }
        .badge--pending  { background:#FEF3C7; color:#92400E; }
        .badge--approved { background:#D1FAE5; color:#065F46; }
        .val-main { font-weight:600; }
        .val-sub  { font-size:.75rem; color:#6B7280; }
        .btn-approve { padding:.35rem .85rem; background:#2D9E3C; color:#fff; border:none; border-radius:var(--radius-sm); font-weight:600; font-size:.8rem; cursor:pointer; }
        .btn-approve:hover { background:#1F7A2C; }
        .btn-approve:disabled { opacity:.4; cursor:not-allowed; }
        .btn-print { padding:.35rem .85rem; background:#fff; color:var(--primary-main); border:1px solid var(--primary-main); border-radius:var(--radius-sm); font-weight:600; font-size:.8rem; cursor:pointer; }
        .btn-print:hover { background:#EFF6FF; }
        .action-btns { display:flex; gap:.5rem; }
        .state-box { padding:3rem; text-align:center; color:#9CA3AF; }

        /* ── Toast ──────────────────────────────────────────────── */
        .toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:.85rem 1.25rem; border-radius:var(--radius-md); font-size:.875rem; font-weight:600; color:#fff; z-index:2000; animation:slideUp .25s ease; max-width:340px; }
        .toast--success { background:#2D9E3C; }
        .toast--error   { background:#DC2626; }
        @keyframes slideUp { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }

        /* ── Mobile Responsive (≤767px) ────────────────────────── */
        @media (max-width: 767px) {
            /* Generate card: stack form fields */
            .generate-card { padding: 1.25rem 1rem; }
            .form-row { flex-direction: column; align-items: stretch; }
            .form-row .f-field { width: 100%; }
            .form-row .btn-preview,
            .form-row .btn-annual-preview { width: 100%; }
            .prev-year-grid { grid-template-columns: 1fr 1fr; }
            .two-col { grid-template-columns: 1fr; }

            /* Table → Card layout */
            .table-card { background: transparent; border: none; border-radius: 0; overflow: visible; }
            .table-wrap { overflow: visible; }
            table  { display: block; }
            thead  { display: none; }
            tbody  { display: flex; flex-direction: column; gap: 0.5rem; }

            tbody tr {
                display: flex;
                flex-direction: column;
                background: #fff;
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 0.875rem 1rem;
                position: relative;
            }
            tbody tr:hover { background: #fff; }
            tbody td { display: block; padding: 0; border: none; }

            tbody td[colspan] {
                display: block !important;
                position: static !important;
                padding: 0 !important;
                order: 0 !important;
            }

            /* Columns: [Unit Eselon I] | Periode | Jumlah UPT | Total Penghematan | Status | Aksi
               Unit is hidden by default (superadmin only).
               When visible: col1=Unit, col2=Periode, ...
               When hidden:  col1=Periode, col2=Jumlah UPT, ... */

            /* Col "Periode" — title (td:nth-child(2) when Unit shown, td:nth-child(1) when hidden) */
            /* We target by dynamic column position using :has on the thead th[id=colUnit] visibility */
            /* Simpler: style all possible positions */

            tbody td:nth-child(1) { order: 1; font-size: 0.9375rem; font-weight: 600; padding-right: 80px; }
            tbody td:nth-child(2) { order: 2; font-size: 0.8125rem; color: #6B7280; margin-top: 0.125rem; padding-right: 80px; }
            tbody td:nth-child(3) { order: 3; font-size: 0.8125rem; margin-top: 0.25rem; }
            tbody td:nth-child(4) { order: 4; font-size: 0.875rem; font-weight: 600; margin-top: 0.25rem; }
            /* td:nth-child(5) = Status — pinned top-right */
            tbody td:nth-child(5) { position: absolute; top: 0.875rem; right: 1rem; }
            /* td:nth-child(6) = Aksi */
            tbody td:nth-child(6) { order: 5; margin-top: 0.75rem; }
            tbody td:nth-child(6) .action-btns { gap: 0.375rem; flex-wrap: wrap; }
            tbody td:nth-child(6) .action-btns > * {
                flex: 1; min-height: 36px; font-size: 0.8125rem;
                display: inline-flex; align-items: center; justify-content: center;
            }
        }

        /* ── Print / PDF ────────────────────────────────────────── */
        #printArea { display:none; }
        @media print {
            body > .dashboard { display:none !important; }
            .toast { display:none !important; }
            #printArea {
                display:block !important;
                font-family:'Times New Roman', serif;
                font-size:12pt;
                color:#000;
                padding:2cm 2.5cm;
                line-height:1.6;
            }
            .print-kop {
                text-align:center;
                border-bottom:3px solid #000;
                padding-bottom:.5cm;
                margin-bottom:.6cm;
                font-size:11pt;
            }
            .print-kop-unit { font-size:13pt; font-weight:bold; text-transform:uppercase; }
            .print-title {
                text-align:center;
                font-weight:bold;
                font-size:13pt;
                text-transform:uppercase;
                margin:1cm 0 .75cm;
                line-height:1.4;
            }
            .print-meta { margin-bottom:.75cm; }
            .print-meta table { border:none; }
            .print-meta td { padding:.1cm .25cm; vertical-align:top; }
            .print-meta td:first-child { width:3cm; }
            .print-meta td:nth-child(2){ width:.5cm; }
            .print-section { margin-bottom:.6cm; }
            .print-section-title { font-weight:bold; }
            .print-section-content { margin-left:.5cm; }
            .print-table { width:100%; border-collapse:collapse; margin-top:.4cm; }
            .print-table th, .print-table td { border:1px solid #000; padding:.2cm .35cm; text-align:left; }
            .print-table th { background:#f0f0f0; font-weight:bold; text-align:center; }
            .print-table td:first-child { text-align:center; width:.7cm; }
            .print-table td:nth-child(3), .print-table td:nth-child(4), .print-table td:nth-child(5) { text-align:right; }
            .print-ttd { margin-top:1.5cm; text-align:right; }
            .print-ttd-space { height:2.5cm; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <header class="header">
        <div class="header__brand">
            <img src="../assets/img/logo.svg" class="header__logo" alt="GEMAR-KKP">
            <span class="header__title">GEMAR-KKP</span>
        </div>
        <nav class="header__nav">
            <a href="dashboard.html" class="header__link">Dashboard</a>
            <a href="approval.html"  class="header__link" id="navApproval" style="display:none">Approval</a>
            <a href="#"              class="header__link header__link--active">Final Report</a>
            <button class="header__btn header__btn--logout" onclick="handleLogout()">Logout</button>
        </nav>
    </header>

    <main class="main">
        <section class="welcome">
            <h1 class="welcome__title">Final Report</h1>
            <p class="welcome__subtitle" id="userInfo">Memuat...</p>
        </section>

        <!-- Panel Laporan Tahunan (eselon1 only) -->
        <div id="generatePanel" style="display:none">
            <div class="generate-card">
                <div class="card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#2D9E3C">
                        <path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Laporan Tahunan
                </div>

                <div class="form-row">
                    <div class="f-field">
                        <label>Tahun</label>
                        <select id="genTahun">
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                        </select>
                    </div>
                    <button class="btn-preview" id="btnPreview" onclick="loadAnnualSummary()">Lihat Agregasi</button>
                </div>

                <div class="preview-section" id="previewSection">
                    <hr class="divider">
                    <div style="font-size:.875rem; font-weight:700; color:var(--text-main); margin-bottom:1rem;" id="previewTitle"></div>
                    <div class="preview-grid" id="previewGrid"></div>
                    <div style="font-size:.8rem; color:#6B7280; margin-bottom:.5rem;">UPT tercakup:</div>
                    <div class="upt-chips" id="uptChips"></div>
                    <div id="noDataWarn"></div>

                    <div style="margin-top:1rem;">
                        <button class="btn-annual-preview" id="btnAnnualPreview" onclick="openAnnualPreview()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;flex-shrink:0"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            Preview Laporan Tahunan
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Daftar Final Report -->
        <div class="section-title-bar">
            <h2>Daftar Final Report</h2>
        </div>
        <div class="table-card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th id="colUnit" style="display:none">Unit Eselon I</th>
                            <th>Periode</th>
                            <th>Jumlah UPT</th>
                            <th>Total Penghematan</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6"><div class="state-box">Memuat data...</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Area Print (hidden, hanya muncul saat print) -->
<div id="printArea"></div>

<script src="../assets/js/auth.js"></script>
<script>
    const user = requireAuth();
    if (!user) throw new Error('redirect');
    if (user.role === 'upt_admin') window.location.href = 'dashboard.html';
    initBottomNav('final');

    const roleLabels = { eselon1:'Sekretaris Ditjen / Badan', superadmin:'Sekretaris Jenderal' };
    document.getElementById('userInfo').textContent = (user.name || '') + ' — ' + (roleLabels[user.role] || user.role);

    const now = new Date();
    document.getElementById('genTahun').value = now.getFullYear();

    if (user.role === 'eselon1') {
        document.getElementById('generatePanel').style.display = 'block';
        document.getElementById('navApproval').style.display   = 'inline';
    }
    if (user.role === 'superadmin' || user.role === 'asisten_superadmin') {
        document.getElementById('colUnit').style.display = '';
    }

    let previewData = null;

    async function loadAnnualSummary() {
        const tahun = document.getElementById('genTahun').value;
        const btn   = document.getElementById('btnPreview');
        btn.disabled = true; btn.textContent = 'Memuat...';

        document.getElementById('previewSection').classList.remove('show');
        previewData = null;

        try {
            const [result, uptResult] = await Promise.all([
                fetch(AUTH_CONFIG.apiUrl, { method:'POST', body: new URLSearchParams({ action:'report.monthly.list', token:getToken(), limit:'500' }) }).then(r => r.json()),
                fetch(AUTH_CONFIG.apiUrl, { method:'POST', body: new URLSearchParams({ action:'master.upt.list',    token:getToken()           }) }).then(r => r.json()).catch(() => ({}))
            ]);
            if (!result.success) throw new Error(result.error);

            const uptList = (uptResult.data && uptResult.data.list) || uptResult.list || [];
            const uptMap  = {};
            uptList.forEach(u => { if (u.kode) uptMap[String(u.kode).toUpperCase()] = u.nama || String(u.kode); });

            const reports = (result.data.reports || []).filter(r =>
                r.status === 'approved' && String(r.tahun) === String(tahun)
            );

            let totListrikKwh=0, totListrikHarga=0;
            let totAirKubik=0,   totAirHarga=0;
            let totTelJam=0,     totTelHarga=0;
            const uptSet  = new Set();
            const bulanSet = new Set();

            reports.forEach(r => {
                totListrikKwh   += parseFloat(r.listrik_kwh)   || 0;
                totListrikHarga += parseFloat(r.listrik_harga) || 0;
                totAirKubik     += parseFloat(r.air_kubik)     || 0;
                totAirHarga     += parseFloat(r.air_harga)     || 0;
                totTelJam       += parseFloat(r.telepon_jam)   || 0;
                totTelHarga     += parseFloat(r.telepon_harga) || 0;
                uptSet.add(String(r.upt_id));
                bulanSet.add(parseInt(r.bulan));
            });

            const totBiaya = totListrikHarga + totAirHarga + totTelHarga;
            previewData = { tahun, reports };

            document.getElementById('previewTitle').textContent =
                'Agregasi Tahun ' + tahun + ' — ' + uptSet.size + ' UPT, ' + bulanSet.size + ' bulan';

            if (reports.length === 0) {
                document.getElementById('previewGrid').innerHTML = '';
                document.getElementById('uptChips').innerHTML    = '';
                document.getElementById('noDataWarn').innerHTML  =
                    '<div style="background:#FEF3C7;border-radius:8px;padding:.75rem 1rem;color:#92400E;font-size:.875rem;margin-top:.5rem">' +
                    '<strong>Belum ada laporan yang disetujui untuk tahun ' + tahun + '</strong><br>' +
                    'Pastikan laporan UPT sudah di-approve di halaman Approval.</div>';
                document.getElementById('previewSection').classList.add('show');
                return;
            }

            document.getElementById('noDataWarn').innerHTML = '';
            document.getElementById('previewGrid').innerHTML = `
                <div class="pv-item">
                    <div class="pv-item__label">Listrik</div>
                    <div class="pv-item__val">${fmtNum(totListrikKwh)} kWh</div>
                    <div class="pv-item__sub">${fmtRp(totListrikHarga)}</div>
                </div>
                <div class="pv-item">
                    <div class="pv-item__label">Air</div>
                    <div class="pv-item__val">${fmtNum(totAirKubik)} m³</div>
                    <div class="pv-item__sub">${fmtRp(totAirHarga)}</div>
                </div>
                <div class="pv-item">
                    <div class="pv-item__label">Telepon</div>
                    <div class="pv-item__val">${fmtNum(totTelJam)} jam</div>
                    <div class="pv-item__sub">${fmtRp(totTelHarga)}</div>
                </div>
                <div class="pv-item pv-item--hemat">
                    <div class="pv-item__label">Total Biaya</div>
                    <div class="pv-item__val">${fmtRp(totBiaya)}</div>
                    <div class="pv-item__sub">${uptSet.size} UPT · ${bulanSet.size} bulan</div>
                </div>`;

            document.getElementById('uptChips').innerHTML = [...uptSet].map(u =>
                `<span class="upt-chip">${escHtml(uptMap[u.toUpperCase()] || u)}</span>`).join('');

            document.getElementById('previewSection').classList.add('show');

        } catch(err) {
            showToast('Gagal memuat agregasi: ' + err.message, 'error');
        } finally {
            btn.disabled = false; btn.textContent = 'Lihat Agregasi';
        }
    }

    function openAnnualPreview() {
        const tahun = document.getElementById('genTahun').value;
        window.open('preview-laporan.html?mode=annual&tahun=' + encodeURIComponent(tahun), '_blank');
    }

    // ── Daftar Final Report ───────────────────────────────────
    async function loadFinalReports() {
        PageLoader.start('Memuat final report...');
        const tbody = document.getElementById('tableBody');

        const body = new URLSearchParams({ action:'report.final.list', token:getToken() });
        try {
            const res    = await fetch(AUTH_CONFIG.apiUrl, { method:'POST', body });
            const result = await res.json();
            if (!result.success) throw new Error(result.error);

            const reports = result.data.reports || [];
            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="state-box">Belum ada final report.</div></td></tr>';
                PageLoader.finish();
                return;
            }

            const isSuperadmin = user.role === 'superadmin' || user.role === 'asisten_superadmin';
            tbody.innerHTML = reports.map(r => {
                const bulanInt = parseInt(r.bulan);
                const periode  = bulanInt === 0 ? 'Tahunan ' + r.tahun : NAMA_BULAN[bulanInt] + ' ' + r.tahun;
                const isPending = r.status === 'pending_approval';
                const badgeCls  = isPending ? 'badge--pending' : 'badge--approved';
                const badgeTxt  = isPending ? 'Menunggu Persetujuan' : 'Disetujui';
                const unitTd    = isSuperadmin ? `<td>${escHtml(r.eselon1_nama || r.eselon1_id)}</td>` : '';
                const approveTd = (isSuperadmin && isPending)
                    ? `<button class="btn-approve" onclick="approveFinal('${escHtml(String(r.id))}',this)">Setujui</button>`
                    : '';
                const printBtn  = `<button class="btn-print" onclick="printReport(${escHtml(JSON.stringify(r))})">Cetak PDF</button>`;

                return `<tr>
                    ${unitTd}
                    <td>${escHtml(periode)}</td>
                    <td class="val-main">${r.total_upt} UPT</td>
                    <td class="val-main" style="color:#2D9E3C">${fmtRp(r.total_penghematan)}</td>
                    <td><span class="badge ${badgeCls}">${badgeTxt}</span></td>
                    <td><div class="action-btns">${approveTd}${printBtn}</div></td>
                </tr>`;
            }).join('');
            PageLoader.finish();

        } catch(err) {
            PageLoader.error(
                'Gagal memuat final report: ' + err.message,
                loadFinalReports
            );
        }
    }

    async function approveFinal(reportId, btn) {
        if (!confirm('Setujui final report ini?')) return;
        btn.disabled = true; btn.textContent = 'Menyetujui...';
        const body = new URLSearchParams({ action:'report.final.approve', token:getToken(), report_id:reportId });
        try {
            const res    = await fetch(AUTH_CONFIG.apiUrl, { method:'POST', body });
            const result = await res.json();
            if (!result.success) throw new Error(result.error);
            showToast('Final report berhasil disetujui.', 'success');
            await loadFinalReports();
        } catch(err) {
            showToast('Gagal: ' + err.message, 'error');
            btn.disabled = false; btn.textContent = 'Setujui';
        }
    }

    // ── Cetak PDF ─────────────────────────────────────────────
    function printReport(r) {
        const bulan     = parseInt(r.bulan);
        const tahun     = String(r.tahun);
        const bulanNama = NAMA_BULAN[bulan] || String(bulan);
        const tahunLalu = String(parseInt(tahun) - 1);

        function pct(sekarang, lalu) {
            if (!lalu || lalu == 0) return '—';
            const delta = ((sekarang - lalu) / lalu) * 100;
            return (delta >= 0 ? '+' : '') + delta.toFixed(1) + '%';
        }

        const listrikHarga  = parseFloat(r.listrik_harga)  || 0;
        const listrikLalu   = parseFloat(r.listrik_harga_lalu) || 0;
        const teleponHarga  = parseFloat(r.telepon_harga)  || 0;
        const teleponLalu   = parseFloat(r.telepon_harga_lalu) || 0;
        const airHarga      = parseFloat(r.air_harga)      || 0;
        const airLalu       = parseFloat(r.air_harga_lalu) || 0;

        const eselon1Nama = r.eselon1_nama || r.eselon1_id || '';
        const upaya   = r.upaya_penghematan || '—';
        const kendala = r.kendala           || '—';
        const nama    = r.nama_pimpinan     || '................................';
        const nip     = r.nip_pimpinan      || '................................';

        document.getElementById('printArea').innerHTML = `
            <div class="print-kop">
                <div class="print-kop-unit">${escHtml(eselon1Nama)}</div>
                <div>KEMENTERIAN KELAUTAN DAN PERIKANAN REPUBLIK INDONESIA</div>
            </div>

            <div class="print-title">
                LAPORAN PELAKSANAAN PENGHEMATAN ENERGI<br>
                DI LINGKUNGAN KEMENTERIAN KELAUTAN DAN PERIKANAN
            </div>

            <div class="print-meta">
                <table>
                    <tr><td>Unit Kerja</td><td>:</td><td>${escHtml(eselon1Nama)}</td></tr>
                    <tr><td>Tahun</td><td>:</td><td>${escHtml(tahun)}</td></tr>
                    <tr><td>Bulan</td><td>:</td><td>${escHtml(bulanNama)}</td></tr>
                </table>
            </div>

            <div class="print-section">
                <div class="print-section-title">A. Upaya Penghematan Yang Telah Dilakukan</div>
                <div class="print-section-content">${escHtml(upaya)}</div>
            </div>

            <div class="print-section">
                <div class="print-section-title">B. Kendala Yang Dihadapi</div>
                <div class="print-section-content">${escHtml(kendala)}</div>
            </div>

            <div class="print-section">
                <div class="print-section-title">C. Pengeluaran Langganan Daya dan Jasa</div>
                <table class="print-table">
                    <thead>
                        <tr>
                            <th>NO</th>
                            <th>UTILITAS</th>
                            <th>${escHtml(tahunLalu)}</th>
                            <th>${escHtml(tahun)}</th>
                            <th>% (+/-)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td><td>Listrik</td>
                            <td>${fmtRp(listrikLalu)}</td>
                            <td>${fmtRp(listrikHarga)}</td>
                            <td>${pct(listrikHarga, listrikLalu)}</td>
                        </tr>
                        <tr>
                            <td>2</td><td>Telepon</td>
                            <td>${fmtRp(teleponLalu)}</td>
                            <td>${fmtRp(teleponHarga)}</td>
                            <td>${pct(teleponHarga, teleponLalu)}</td>
                        </tr>
                        <tr>
                            <td>3</td><td>Air</td>
                            <td>${fmtRp(airLalu)}</td>
                            <td>${fmtRp(airHarga)}</td>
                            <td>${pct(airHarga, airLalu)}</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="print-ttd">
                <div>Pimpinan Unit Kerja,</div>
                <div class="print-ttd-space"></div>
                <div><strong>${escHtml(nama)}</strong></div>
                <div>NIP. ${escHtml(nip)}</div>
            </div>
        `;

        window.print();
    }

    loadFinalReports();
</script>
</body>
</html>
