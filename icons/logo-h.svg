<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" fill="none">
  <!-- ===== CLIP PATH for icon ===== -->
  <defs>
    <clipPath id="iconMaskH">
      <rect x="0" y="5" width="90" height="90" rx="21"/>
    </clipPath>
  </defs>

  <!-- ===== LOGO ICON ===== -->
  <g clip-path="url(#iconMaskH)">
    <rect x="0" y="5" width="90" height="90" fill="url(#bgGradientH)"/>
    <rect x="0" y="5" width="90" height="90" fill="url(#shimmerH)" opacity="0.4"/>

    <!-- Sun -->
    <circle cx="69" cy="22" r="6.5" fill="url(#sunGradientH)"/>
    <circle cx="69" cy="22" r="9" fill="url(#sunGlowH)" opacity="0.5"/>
    <path d="M 68 19 L 66.5 23 L 68 23 L 67 26 L 71 22 L 69 22 L 70 19 Z"
          fill="#FFF9E5"/>

    <!-- Leaf -->
    <g transform="translate(15, 19)">
      <path d="M 0 0 Q 3 -7, 10 -4 Q 7 3, 0 0 Z" fill="url(#leafH)"/>
    </g>

    <!-- Sparkles -->
    <circle cx="52" cy="14" r="0.9" fill="#FFE066" opacity="0.9"/>
    <circle cx="57" cy="10" r="0.6" fill="#FFE066" opacity="0.7"/>

    <!-- Subtle backdrop behind KKP text -->
    <circle cx="45" cy="50" r="24" fill="url(#textBackdropH)" opacity="0.15"/>

    <!-- KKP text -->
    <text x="45" y="60"
          font-family="'Plus Jakarta Sans', system-ui, sans-serif"
          font-weight="800"
          font-size="28"
          letter-spacing="-1"
          text-anchor="middle"
          fill="url(#textGradientH)">KKP</text>

    <!-- Underline accent -->
    <line x1="38" y1="66" x2="52" y2="66" stroke="#FFE066" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>

    <!-- Waves -->
    <path d="M -5 78 Q 15 73, 30 78 T 60 78 T 95 78 L 95 100 L -5 100 Z"
          fill="url(#waveBackH)" opacity="0.55"/>
    <path d="M -5 82 Q 16 78, 32 82 T 62 82 T 95 82 L 95 100 L -5 100 Z"
          fill="url(#waveMidH)" opacity="0.75"/>
    <path d="M -5 86 Q 18 82, 36 86 T 64 86 T 95 86 L 95 100 L -5 100 Z"
          fill="url(#waveFrontH)"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(108, 0)">
    <!-- GEMAR — primary brand word -->
    <text x="0" y="48"
          font-family="'Plus Jakarta Sans', system-ui, sans-serif"
          font-weight="800"
          font-size="42"
          letter-spacing="-1.8"
          fill="#0A3D5C">GEMAR</text>

    <!-- KKP suffix -->
    <text x="156" y="48"
          font-family="'Plus Jakarta Sans', system-ui, sans-serif"
          font-weight="800"
          font-size="42"
          letter-spacing="-1.2"
          fill="#2D9E7C">·KKP</text>

    <!-- Tagline -->
    <text x="2" y="72"
          font-family="'Instrument Sans', system-ui, sans-serif"
          font-weight="500"
          font-size="11"
          letter-spacing="2"
          fill="#5A7A8A">GERAKAN MANDIRI HEMAT ENERGI</text>

    <!-- Subtitle -->
    <text x="2" y="88"
          font-family="'Instrument Sans', system-ui, sans-serif"
          font-weight="400"
          font-size="9.5"
          letter-spacing="0.5"
          fill="#8A9AA5"
          font-style="italic">Kementerian Kelautan dan Perikanan</text>
  </g>

  <defs>
    <linearGradient id="bgGradientH" x1="0" y1="5" x2="90" y2="95">
      <stop offset="0%" stop-color="#0A3D5C"/>
      <stop offset="50%" stop-color="#0E5575"/>
      <stop offset="100%" stop-color="#0F6980"/>
    </linearGradient>
    <linearGradient id="shimmerH" x1="0" y1="5" x2="90" y2="95">
      <stop offset="0%" stop-color="#1A7A9A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A3D5C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sunGradientH" cx="0.4" cy="0.4">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="60%" stop-color="#F4B400"/>
      <stop offset="100%" stop-color="#E89B00"/>
    </radialGradient>
    <radialGradient id="sunGlowH" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#F4B400" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F4B400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGradientH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <radialGradient id="textBackdropH" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveBackH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D9E7C"/>
      <stop offset="100%" stop-color="#1A7A5E"/>
    </linearGradient>
    <linearGradient id="waveMidH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34B890"/>
      <stop offset="100%" stop-color="#2D9E7C"/>
    </linearGradient>
    <linearGradient id="waveFrontH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ACFA6"/>
      <stop offset="100%" stop-color="#2D9E7C"/>
    </linearGradient>
    <linearGradient id="leafH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6BCF7F"/>
      <stop offset="100%" stop-color="#2D9E3C"/>
    </linearGradient>
  </defs>
</svg>
